<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบวิสาหกิจชุมชนสมุนไพรอบแห้ง</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            herbal: {
              50: '#f4f9f4',
              100: '#e7f3e7',
              200: '#c5e2c5',
              300: '#94cb94',
              400: '#5da85d',
              500: '#3c8d3c',
              600: '#2d722d',
              700: '#245a24',
              800: '#1e4620', // Custom Forest Green
              900: '#1b3b1c',
              950: '#0e1f0f',
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts & Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Custom CSS for Premium Design -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#f4f9f4] min-h-screen flex">

  <!-- Mobile Sidebar Overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-30 hidden transition-opacity lg:hidden"></div>

  <!-- Sidebar (Left Navigation) -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-gradient-to-b from-[#1e4620] to-[#153216] text-white flex flex-col z-40 transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:h-screen lg:flex-shrink-0 shadow-xl">
    
    <!-- Sidebar Header (Brand Logo/Name) -->
    <div class="p-6 border-b border-emerald-900 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-white/10 backdrop-blur-md flex items-center justify-center text-white border border-white/20">
          <i class="fas fa-leaf text-xl text-green-300"></i>
        </div>
        <div>
          <span class="text-[10px] font-bold text-green-300 uppercase tracking-widest block">วิสาหกิจสมุนไพร</span>
          <span class="text-sm font-extrabold text-white block truncate w-44 enterprise-name-display">วิสาหกิจสมุนไพรอบแห้ง</span>
        </div>
      </div>
      <!-- Close button on Mobile -->
      <button class="lg:hidden text-white/70 hover:text-white text-xl">
        <!-- Event bound via app.js -->
      </button>
    </div>

    <!-- Sidebar Navigation Links -->
    <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto">
      
      <a href="#" data-view="dashboard" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-gray-200">
        <i class="fas fa-chart-line text-lg w-5"></i>
        <span>แดชบอร์ดภาพรวม</span>
      </a>

      <a href="#" data-view="members" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-gray-200">
        <i class="fas fa-users text-lg w-5 text-emerald-700"></i>
        <span>จัดการทะเบียนสมาชิก</span>
      </a>

      <a href="#" data-view="plots" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-gray-200">
        <i class="fas fa-map-marked-alt text-lg w-5 text-emerald-700"></i>
        <span>จัดการแปลงปลูกสมุนไพร</span>
      </a>

      <a href="#" data-view="crops" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-gray-200">
        <i class="fas fa-history text-lg w-5 text-emerald-700"></i>
        <span>บันทึกรอบเพาะปลูก</span>
      </a>

      <a href="#" data-view="inventory" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-gray-200">
        <i class="fas fa-warehouse text-lg w-5 text-emerald-700"></i>
        <span>คลังสินค้าและบัญชี</span>
      </a>

      <div class="border-t border-emerald-900/60 my-4"></div>

      <a href="#" data-view="settings" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-gray-200">
        <i class="fas fa-cogs text-lg w-5 text-emerald-700"></i>
        <span>ตั้งค่าข้อมูลวิสาหกิจ</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="p-6 border-t border-emerald-900/60 bg-[#122c13]">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-emerald-800 flex items-center justify-center text-xs font-bold border border-emerald-700">
          BE
        </div>
        <div class="flex-1 overflow-hidden">
          <span class="text-xs font-bold text-gray-300 block truncate enterprise-name-display">วิสาหกิจชุมชนแม่ริม</span>
          <span class="text-[10px] text-green-400 block truncate enterprise-village-display">หมู่ 4 ต.แม่แรม</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Viewport (Right Area) -->
  <div class="flex-1 flex flex-col min-h-screen overflow-y-auto">
    
    <!-- Top Header Navigation (Responsive bar) -->
    <header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between sticky top-0 z-20 shadow-sm">
      <div class="flex items-center gap-3">
        <!-- Sidebar Toggle for Mobile -->
        <button id="sidebar-toggle" class="p-2 -ml-2 text-gray-500 hover:text-emerald-700 rounded-xl hover:bg-gray-50 lg:hidden focus:outline-none">
          <i class="fas fa-bars text-xl"></i>
        </button>
        <div class="hidden sm:block">
          <span class="text-xs text-gray-400 font-medium block">ยินดีต้อนรับเข้าสู่ระบบ</span>
          <span class="text-sm font-bold text-gray-800 enterprise-name-display">วิสาหกิจชุมชนสมุนไพรอบแห้ง</span>
        </div>
      </div>

      <!-- Quick stats summary on top header -->
      <div class="flex items-center gap-6">
        <div class="hidden md:flex items-center gap-4 text-xs font-semibold">
          <span class="flex items-center gap-1.5 text-gray-500">
            <i class="fas fa-users text-emerald-600"></i>
            สมาชิก: <span class="text-gray-900 font-bold enterprise-village-display">หมู่ 4</span>
          </span>
          <span class="h-4 w-px bg-gray-200"></span>
          <span class="flex items-center gap-1.5 text-gray-500">
            <i class="fas fa-seedling text-amber-500"></i>
            พืชเด่น: <span class="text-gray-900 font-bold">เก๊กฮวย/คาโมมายล์</span>
          </span>
        </div>
      </div>
    </header>

    <!-- App Dynamic Views Container -->
    <main id="app-view" class="p-4 md:p-8 max-w-7xl mx-auto w-full space-y-6 flex-1">
      <!-- RENDERED BY APP.JS -->
      <div class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-700"></div>
      </div>
    </main>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3"></div>

  <!-- Main JavaScript App module -->
  <script type="module" src="js/app.js?v=2"></script>
</body>
</html>
